<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thẻ Nhân Viên Điện Tử</title>
    
    <style>
        /* Khởi tạo CSS biến và reset cơ bản */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: #0f172a; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Khung Card chính */
        .card-container {
            background-color: #ffffff;
            border-radius: 1.5rem; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); 
            overflow: hidden;
            width: 100%;
            max-width: 24rem; 
            border: 1px solid #f1f5f9; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Phần Header Gradient */
        .card-header {
            background: linear-gradient(to right, #2563eb, #4338ca); 
            padding: 1.5rem;
            text-align: center;
            position: relative;
        }

        /* Vòng tròn Avatar */
        .avatar-holder {
            width: 5rem; 
            height: 5rem; 
            background-color: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.75rem auto;
            border: 2px solid rgba(255, 255, 255, 0.5); 
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06); 
        }

        /* Định dạng chung cho các icon SVG */
        .svg-icon {
            width: 1.25rem;
            height: 1.25rem;
            fill: currentColor;
        }
        
        .avatar-holder .svg-icon {
            width: 2rem;
            height: 2rem;
            color: #ffffff;
        }

        .user-name {
            font-size: 1.25rem; 
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.05em; 
        }

        .user-position {
            color: #dbeafe; 
            font-size: 0.75rem; 
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em; 
            margin-top: 0.25rem;
        }

        /* Phần thân Card */
        .card-body {
            padding: 1.5rem;
            background-color: rgba(248, 250, 252, 0.5); 
        }

        /* Các dòng thông tin (Row) */
        .info-item {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            padding: 0.75rem;
            border-radius: 0.75rem; 
            border: 1px solid #f1f5f9; 
            margin-bottom: 1rem; 
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); 
        }
        .info-item:last-child {
            margin-bottom: 0;
        }

        /* Icon bọc ngoài */
        .icon-box {
            width: 2rem; 
            height: 2rem; 
            border-radius: 0.5rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.75rem; 
            flex-shrink: 0;
        }
        
        /* Màu sắc riêng cho từng icon box */
        .icon-blue { background-color: #eff6ff; color: #2563eb; }
        .icon-amber { background-color: #fffbeb; color: #d97706; }
        .icon-emerald { background-color: #ecfdf5; color: #059669; }
        .icon-indigo { background-color: #e0e7ff; color: #4f46e5; }

        /* Text chi tiết */
        .info-content {
            flex: 1 1 0%;
        }

        .info-label {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8; 
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .info-value {
            font-size: 0.875rem; 
            color: #334155; 
            margin-top: 0.125rem;
        }
        .font-bold-spec { font-weight: 700; }
        .font-semibold-spec { font-weight: 600; }

        /* Phần Footer và Nút bấm */
        .card-footer {
            padding: 1rem;
            background-color: #ffffff;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: center;
        }

        .btn-close {
            width: 100%;
            background-color: #1e293b; 
            color: #ffffff;
            font-weight: 500;
            padding: 0.75rem 0;
            border-radius: 0.75rem;
            border: none;
            font-size: 0.875rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem; 
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-close:hover {
            background-color: #0f172a; 
        }

        .btn-close:active {
            transform: scale(0.98); 
        }
    </style>
</head>
<body>

    <!-- Khung Card thông tin nhân viên -->
    <div class="card-container">
        
        <!-- Phần Header của Card -->
        <div class="card-header">
            <div class="avatar-holder">
                <!-- SVG User Tie Icon -->
                <svg class="svg-icon" viewBox="0 0 448 512"><path d="M224 256A128 128 0 1 0 224 0a128 128 0 1 0 0 256zm-45.7 48C79.8 304 0 383.8 0 482.3C0 498.7 13.3 512 29.7 512H418.3c16.4 0 29.7-13.3 29.7-29.7C448 383.8 368.2 304 269.7 304H178.3z"/></svg>
            </div>
            <h2 id="fullName" class="user-name">Đang tải...</h2>
            <p id="position" class="user-position">Đang tải...</p>
        </div>

        <!-- Phần thân hiển thị chi tiết thông tin -->
        <div class="card-body">
            
            <!-- Mã nhân viên -->
            <div class="info-item">
                <div class="icon-box icon-blue">
                    <!-- SVG ID Card Clip Icon -->
                    <svg class="svg-icon" viewBox="0 0 576 512"><path d="M0 96C0 60.7 28.7 32 64 32H512c35.3 0 64 28.7 64 64V416c0 35.3-28.7 64-64 64H64c-35.3 0-64-28.7-64-64V96zm128 64a48 48 0 1 0 0-96 48 48 0 1 0 0 96zM96 288c0 17.7 14.3 32 32 32h96c17.7 0 32-14.3 32-32s-14.3-32-32-32H128c-17.7 0-32 14.3-32 32zm0 96c0 17.7 14.3 32 32 32h192c17.7 0 32-14.3 32-32s-14.3-32-32-32H128c-17.7 0-32 14.3-32 32zm288-64a48 48 0 1 0 0-96 48 48 0 1 0 0 96z"/></svg>
                </div>
                <div class="info-content">
                    <p class="info-label">Mã nhân viên</p>
                    <p id="empCode" class="info-value font-bold-spec">-</p>
                </div>
            </div>

            <!-- Năm sinh -->
            <div class="info-item">
                <div class="icon-box icon-amber">
                    <!-- SVG Birthday Cake Icon -->
                    <svg class="svg-icon" viewBox="0 0 448 512"><path d="M112 112c0 13.3 10.7 24 24 24h16c13.3 0 24-10.7 24-24V24c0-13.3-10.7-24-24-24h-16c-13.3 0-24 10.7-24 24v88zm160 0c0 13.3 10.7 24 24 24h16c13.3 0 24-10.7 24-24V24c0-13.3-10.7-24-24-24h-16c-13.3 0-24 10.7-24 24v88zM24 192H424c13.3 0 24-10.7 24-24s-10.7-24-24-24H24C10.7 144 0 154.7 0 168s10.7 24 24 24zm400 48H24c-13.3 0-24 10.7-24 24v192c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V264c0-13.3-10.7-24-24-24z"/></svg>
                </div>
                <div class="info-content">
                    <p class="info-label">Năm sinh</p>
                    <p id="birthYear" class="info-value font-semibold-spec">-</p>
                </div>
            </div>

            <!-- Số CCCD -->
            <div class="info-item">
                <div class="icon-box icon-emerald">
                    <!-- SVG ID Card Icon -->
                    <svg class="svg-icon" viewBox="0 0 576 512"><path d="M528 32H48C21.5 32 0 53.5 0 80v352c0 26.5 21.5 48 48 48h480c26.5 0 48-21.5 48-48V80c0-26.5-21.5-48-48-48zm-352 96a64 64 0 1 1 0 128 64 64 0 1 1 0-128zm128 256H48v-16c0-35.3 28.7-64 64-64h128c35.3 0 64 28.7 64 64v16zm224-32H352v-32h176v32zm0-64H352v-32h176v32zm0-64H352v-32h176v32z"/></svg>
                </div>
                <div class="info-content">
                    <p class="info-label">Số CCCD</p>
                    <p id="idCard" class="info-value font-semibold-spec" style="letter-spacing: 0.05em;">-</p>
                </div>
            </div>

            <!-- Nơi công tác -->
            <div class="info-item">
                <div class="icon-box icon-indigo">
                    <!-- SVG Location Pin Icon -->
                    <svg class="svg-icon" viewBox="0 0 384 512"><path d="M215.7 499.2C267 435 384 279.4 384 192C384 86 298 0 192 0S0 86 0 192c0 87.4 117 243 168.3 307.2c12.3 15.3 35.1 15.3 47.4 0zM192 256c-35.3 0-64-28.7-64-64s28.7-64 64-64s64 28.7 64 64s-28.7 64-64 64z"/></svg>
                </div>
                <div class="info-content">
                    <p class="info-label">Nơi công tác</p>
                    <p id="workplace" class="info-value font-semibold-spec">-</p>
                </div>
            </div>

        </div>

        <!-- Nút đóng nhanh -->
        <div class="card-footer">
            <button onclick="handleClose()" class="btn-close">
                <!-- SVG XMark Circle Icon -->
                <svg class="svg-icon" viewBox="0 0 512 512"><path d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM175 175c9.4-9.4 24.6-9.4 33.9 0l47 47 47-47c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9l-47 47 47 47c9.4 9.4 9.4 24.6 0 33.9s-24.6 9.4-33.9 0l-47-47-47 47c-9.4 9.4-24.6 9.4-33.9 0s-9.4-24.6 0-33.9l47-47-47-47c-9.4-9.4-9.4-24.6 0-33.9z"/></svg>
                <span>Đóng thông tin</span>
            </button>
        </div>
    </div>

<script>
    function handleClose() {
        if (window.opener || window.history.length === 1) { window.close(); } 
        else { window.history.back(); }
    }

    // Hàm giải nén GZIP native (Thay thế pako hoàn toàn)
    async function decompressGzip(bytes) {
        const stream = new Response(bytes).body.pipeThrough(new DecompressionStream('gzip'));
        const result = await new Response(stream).text();
        return result;
    }

    const urlParams = new URLSearchParams(window.location.search);
    const base64Data = urlParams.get('data');

    if (base64Data) {
        // Sử dụng IIFE async để giải nén dữ liệu bất đồng bộ bằng API Native
        (async () => {
            try {
                let base64 = base64Data.replace(/-/g, '+').replace(/_/g, '/');
                
                while (base64.length % 4) {
                    base64 += '=';
                }

                const binaryString = atob(base64);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // Thực hiện giải nén không cần thư viện ngoài
                const jsonString = await decompressGzip(bytes);
                const data = JSON.parse(jsonString);

                // Đổ dữ liệu ra UI
                document.getElementById('fullName').innerText  = data.n || "Chưa cập nhật";
                document.getElementById('position').innerText  = data.p || "Chưa cập nhật";
                document.getElementById('empCode').innerText   = data.m || "Chưa cập nhật";
                document.getElementById('birthYear').innerText = data.y || "Chưa cập nhật";
                document.getElementById('idCard').innerText    = data.c || "Chưa cập nhật";
                document.getElementById('workplace').innerText = data.w || "Chưa cập nhật";

            } catch (e) {
                console.error("Lỗi giải nén hoặc parse:", e);
                document.getElementById('fullName').innerText = "Lỗi dữ liệu mã QR!";
            }
        })();
    }
</script>
</body>
</html>
